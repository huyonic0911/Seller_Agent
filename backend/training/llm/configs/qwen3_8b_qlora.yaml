# Cấu hình QLoRA cho Qwen3-8B trên 1×A6000 (48GB) — điểm khởi đầu.
# Đổi base_model sang bản 9B (vd Qwen/Qwen3.5-9B) nếu chốt dùng 9B; pipeline không đổi.

base_model: unsloth/Qwen3-8B      # hoặc Qwen/Qwen3-8B
max_seq_length: 4096              # đủ persona + full catalog + reply
load_in_4bit: true               # QLoRA (đổi false = LoRA bf16, A6000 vẫn gánh được 8B)

# LoRA
lora_r: 32
lora_alpha: 64
lora_dropout: 0.05
target_modules: [q_proj, k_proj, v_proj, o_proj, gate_proj, up_proj, down_proj]

# Dữ liệu (đường dẫn tương đối backend/)
train_file: training/data/curated/train.jsonl
eval_file: training/data/curated/eval.jsonl
output_dir: training/data/adapters/qwen3-8b-seller-r1

# Huấn luyện
epochs: 3
learning_rate: 0.0002            # 2e-4
per_device_batch_size: 2
grad_accum: 8                    # effective batch = 16
warmup_ratio: 0.03
lr_scheduler: cosine
optim: adamw_8bit
neftune_noise_alpha: 5
logging_steps: 10
eval_steps: 50
save_steps: 100
seed: 42
